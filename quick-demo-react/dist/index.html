<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no" />
  <meta name="description" content="This demo uses React to quickly test essential Tencent RTC features." />
  <link rel="icon" href="https://web.sdk.qcloud.com/trtc/webrtc/assets/trtcio48.avif" />
  <title>Quick Demo React | Tencent RTC</title>

  <!-- Chrome's built-in page translator rewrites text nodes directly in the
       DOM (wrapping them in its own <font> tags), bypassing React entirely.
       When React later tries to update/remove a node that Translate has
       moved or replaced, the browser throws "removeChild: node is not a
       child of this node" and the whole app crashes -- this only happens in
       browsers/profiles where Chrome offers translation (e.g. it detects the
       Arabic UI text and offers to translate to the browser's language), so
       it looked "browser-specific". Opt this page out of Chrome Translate. -->
  <meta name="google" content="notranslate" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Quick Demo React | Tencent RTC" />
  <meta property="og:description" content="This demo uses React to quickly test essential Tencent RTC features." />
  <meta property="og:image" content="https://web.sdk.qcloud.com/trtc/webrtc/assets/og-image-js.png" />

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Quick Demo React | Tencent RTC" />
  <meta name="twitter:description" content="This demo uses React to quickly test essential Tencent RTC features." />
  <meta name="twitter:image" content="https://web.sdk.qcloud.com/trtc/webrtc/assets/og-image-js.png" />

  <!-- Security fix: client-side signing script removed. userSig now comes
       from the backend signing server (see /server). -->
  <script type="module" crossorigin src="./assets/index-B0NuG1wq.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CnySEaHJ.css">
</head>

<body translate="no">
  <div id="root" class="notranslate"></div>
</body>

</html>
