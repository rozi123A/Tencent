services:
  # Unified Server & Frontend (React Version)
  - type: web
    name: tencent-fullstack-app
    runtime: node
    rootDir: .
    buildCommand: "npm install --prefix quick-demo-react && npm run build --prefix quick-demo-react && npm install --prefix server"
    startCommand: "node server/index.js"
    plan: free
    envVars:
      - key: TENCENT_SDK_APP_ID
        sync: false
      - key: TENCENT_SDK_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: NODE_VERSION
        value: "22.12.0"
