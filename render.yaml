services:
  # Unified Server & Frontend — Solves HTTPS/CORS issues
  - type: web
    name: tencent-fullstack-app
    runtime: node
    rootDir: .
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    plan: free
    envVars:
      - key: TENCENT_SDK_APP_ID
        sync: false
      - key: TENCENT_SDK_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: NODE_VERSION
        value: "22.12.0"
